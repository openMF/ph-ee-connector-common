/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'eclipse'
    id 'maven-publish'
    id 'checkstyle'
    id 'org.springframework.boot' version '3.4.4'
    id 'com.diffplug.spotless' version '7.0.2'
}
apply plugin: "io.spring.dependency-management"

repositories {
    mavenLocal()
    mavenCentral()
    // Mifos Platform BOM is consumed from the local JFrog Artifactory sandbox
    // (Docker Compose in proposal/local-jfrog/, UI at http://localhost:8082).
    // When the mentor's official Mifos BOM is ready, swap this host for the
    // production Mifos JFrog.
    maven {
        name = 'LocalJFrog'
        url = uri('http://localhost:8081/artifactory/mifos-platform-snapshot')
        // Local sandbox uses plain HTTP; Gradle blocks HTTP by default.
        allowInsecureProtocol = true
        credentials {
            username = findProperty('localJfrog.user') ?: System.getenv('LOCAL_JFROG_USER')
            password = findProperty('localJfrog.key') ?: System.getenv('LOCAL_JFROG_KEY')
        }
    }
    // Camunda / Zeebe artifacts are not on Maven Central.
    maven { url = uri('https://artifacts.camunda.com/artifactory/zeebe-io/') }
    maven { url = uri('https://artifacts.camunda.com/artifactory/zeebe-io-snapshots/') }
}

apply plugin:'com.diffplug.spotless'
spotless {
    format 'misc', {
        target '**/*.md', '**/*.properties', '**/.gitignore', '**/.openapi-generator-ignore', '**/*.yml', '**/*.xml', '**/**.json', '**/*.sql'
        targetExclude '**/build/**', '**/bin/**', '**/.settings/**', '**/.idea/**', '**/.gradle/**', '**/gradlew.bat', '**/licenses/**', '**/banner.txt', '.vscode/**'
        leadingTabsToSpaces(4)
        endWithNewline()
        trimTrailingWhitespace()
    }

    groovyGradle {
        target '*.gradle', '**/*.gradle'
        targetExclude '**/build/**'
        greclipse()
        leadingTabsToSpaces(4)
        endWithNewline()
        trimTrailingWhitespace()
    }

    lineEndings = com.diffplug.spotless.LineEnding.UNIX
}

dependencies {
    // Mifos Platform BOM imports Spring Boot, Camel, AWS SDK BOMs and pins
    // every other library version. Do NOT hardcode versions below.
    // Use platform() (not enforcedPlatform): this is a published library, and
    // enforced platforms leak forced versions to downstream consumers and break
    // publication metadata generation.
    implementation platform('org.mifos.platform:mifos-platform-bom:1.0.0-SNAPSHOT')

    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    implementation 'org.springframework:spring-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'com.auth0:java-jwt'
    implementation 'org.json:json'
    implementation 'io.camunda:zeebe-client-java'
    implementation 'org.apache.camel:camel-core'
    implementation 'commons-codec:commons-codec'
    implementation 'commons-io:commons-io'
    implementation 'org.apache.commons:commons-lang3'
    implementation 'io.netty:netty-all'

    compileOnly 'jakarta.servlet:jakarta.servlet-api'
    compileOnly 'jakarta.validation:jakarta.validation-api'
    compileOnly 'org.hibernate.validator:hibernate-validator'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    checkstyle 'com.puppycrawl.tools:checkstyle:10.21.0'
    checkstyle 'com.github.sevntu-checkstyle:sevntu-checks:1.44.1'
}

configure(this) {
    // NOTE: order matters!
    apply plugin: 'java'
    apply plugin: 'idea'
    apply plugin: 'eclipse'
    apply plugin: 'checkstyle'
    configurations {
        implementation.setCanBeResolved(true)
        api.setCanBeResolved(true)
    }
    tasks.withType(JavaCompile) {
        options.compilerArgs += [
            "-Xlint:unchecked",
            "-Xlint:cast",
            "-Xlint:auxiliaryclass",
            "-Xlint:deprecation",
            "-Xlint:dep-ann",
            "-Xlint:divzero",
            "-Xlint:empty",
            "-Xlint:exports",
            "-Xlint:fallthrough",
            "-Xlint:finally",
            "-Xlint:module",
            "-Xlint:opens",
            "-Xlint:options",
            "-Xlint:overloads",
            "-Xlint:overrides",
            "-Xlint:path",
            "-Xlint:processing",
            "-Xlint:removal",
            "-Xlint:requires-automatic",
            "-Xlint:requires-transitive-automatic",
            "-Xlint:try",
            "-Xlint:varargs",
            "-Xlint:preview",
            "-Xlint:static",
            // -Werror needs to be disabled because EclipseLink's static weaving doesn't generate warning-free code
            // and during an IntelliJ recompilation, it fails
            //"-Werror",
            "-Xmaxwarns",
            1500,
            "-Xmaxerrs",
            1500
        ]
        options.deprecation = true
    }
    // Configuration for the spotless plugin
    // https://github.com/diffplug/spotless/tree/main/plugin-gradle
    spotless {
        java {
            targetExclude '**/build/**', '**/bin/**', '**/out/**'
            importOrder() //sort imports alphabetically
            removeUnusedImports()
            eclipse().configFile "$rootDir/config/common-formatter.xml"
            endWithNewline()
            trimTrailingWhitespace()
            // Enforce style modifier order
            custom 'Modifier ordering', {
                def modifierRanking = [
                    public      : 1,
                    protected   : 2,
                    private     : 3,
                    abstract    : 4,
                    default     : 5,
                    static      : 6,
                    final       : 7,
                    transient   : 8,
                    volatile    : 9,
                    synchronized: 10,
                    native      : 11,
                    strictfp    : 12]
                // Find any instance of multiple modifiers. Lead with a non-word character to avoid
                // accidental matching against for instance, "an alternative default value"
                it.replaceAll(/\W(?:public |protected |private |abstract |default |static |final |transient |volatile |synchronized |native |strictfp ){2,}/, {
                    // Do not replace the leading non-word character.  Identify the modifiers
                    it.replaceAll(/(?:public |protected |private |abstract |default |static |final |transient |volatile |synchronized |native |strictfp ){2,}/, {
                        // Sort the modifiers according to the ranking above
                        it.split().sort({ modifierRanking[it] }).join(' ') + ' '
                    }
                    )
                }
                )
            }
        }
        lineEndings = com.diffplug.spotless.LineEnding.UNIX
    }
    // If we are running Gradle within Eclipse to enhance classes,
    // set the classes directory to point to Eclipse's default build directory
    if (project.hasProperty('env') && project.getProperty('env') == 'eclipse') {
        sourceSets.main.java.destinationDirectory = file("$projectDir/bin/main")
    }
}

group = 'org.mifos'
version = '2.0.0-SNAPSHOT'
def artifactId = 'ph-ee-connector-common'
def versionNumber = version

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from(components.java)
        }
    }
    repositories {
        // Publish target: the local JFrog Artifactory sandbox (same host used to
        // resolve the Mifos Platform BOM). Swap for the official Mifos JFrog when
        // the mentor's production Artifactory is ready.
        maven {
            name = 'LocalJFrog'
            url = uri('http://localhost:8081/artifactory/mifos-platform-snapshot')
            allowInsecureProtocol = true
            credentials {
                username = findProperty('localJfrog.user') ?: System.getenv('LOCAL_JFROG_USER')
                password = findProperty('localJfrog.key') ?: System.getenv('LOCAL_JFROG_KEY')
            }
        }
    }
}
tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

// connector-common is a library, not an executable Spring Boot app.
// The plain jar is what downstream connectors consume; bootJar produces a
// repackaged fat jar that cannot be used as a Maven dependency.
tasks.named('bootJar') { enabled = false }
tasks.named('jar') {
    enabled = true
    archiveClassifier = ''
}
