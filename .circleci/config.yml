version: 2.1
executors:
  default:
    docker:
      - image: openjdk:17
jobs:
  # build:
  #   docker:
  #     - image: openjdk:17
  #   steps:
  #     - checkout
  #     - run:
  #         name: Set Build Description
  #         command: |
  #           echo "Tag: $CIRCLE_TAG"
  #     - run:
  #         name: Build JAR
  #         command: |
  #           ./gradlew jar

  deploy:
    docker:
      - image: cimg/openjdk:17.0.0
    steps:
      - checkout
      # Gradle cache to speed up builds
      - restore_cache:
          keys:
            - gradle-cache-{{ checksum "build.gradle" }}-{{ checksum "settings.gradle" }}
      - run:
          name: Build and Publish Artifacts
          command: ./gradlew build artifactoryPublish --no-daemon
      - save_cache:
          paths:
            - ~/.gradle/caches/
            - ~/.gradle/wrapper/
          key: gradle-cache-{{ checksum "build.gradle" }}-{{ checksum "settings.gradle" }}


workflows:
  version: 2
  build_and_deploy:
    jobs:    
      - deploy:
          filters:
            tags:
              only: /^v\d+\.\d+\.\d+$/
